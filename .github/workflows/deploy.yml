name: Build e Push ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 585662413697.dkr.ecr.us-east-1.amazonaws.com/aws_ecr_repository

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Login na AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::585662413697:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build da imagem
        run: |
          docker build -t $ECR_REPOSITORY:latest .

      - name: Enviar imagem para o ECR
        run: |
          docker tag $ECR_REPOSITORY:latest \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest
